name: taskgenie
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [taskgenie_internal]

  valkey:
    image: valkey/valkey:9.0.4-alpine
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes", "--appendfsync", "everysec", "--requirepass", "${VALKEY_PASSWORD}", "--maxmemory", "512mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a '${VALKEY_PASSWORD}' --no-auth-warning ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [taskgenie_internal]

  clamav:
    image: clamav/clamav:1.5.2
    restart: unless-stopped
    environment:
      CLAMD_STARTUP_TIMEOUT: 1800
      FRESHCLAM_CHECKS: 24
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping=5 >/dev/null 2>&1"]
      start_period: 5m
      interval: 30s
      timeout: 10s
      retries: 20
    networks: [taskgenie_internal]

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: [.env]
    command: ["node", "apps/api/dist/db/migrate.js"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks: [taskgenie_internal]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: [.env]
    environment:
      UPLOAD_DIR: /app/uploads
    ports:
      - "127.0.0.1:${PORT:-4000}:4000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      clamav:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health/live').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [taskgenie_internal]

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: [.env]
    command: ["node", "apps/api/dist/worker.js"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    networks: [taskgenie_internal]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:4000
      HOSTNAME: 0.0.0.0
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks: [taskgenie_internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      TASKGENIE_DOMAIN: ${TASKGENIE_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks: [taskgenie_internal]

networks:
  taskgenie_internal:
    driver: bridge
volumes:
  postgres_data:
  valkey_data:
  clamav_data:
  uploads_data:
  caddy_data:
  caddy_config:
