name: Full Stack CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Verify generated migration is committed
        env:
          DATABASE_URL: postgresql://taskgenie:password@localhost:5432/taskgenie
        run: |
          npm run db:generate
          git diff --exit-code
